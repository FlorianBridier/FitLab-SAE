services:
  backend:
    build: ./backend
    container_name: fitlab-backend
    env_file:
      - .env
    environment:
      - PORT=${BACKEND_PORT}
      - NODE_ENV=production
    networks:
      - fitlab-net

  proxy:
    build: ./proxy
    container_name: fitlab-proxy
    depends_on:
      - backend
    ports:
      - "80:80"          # En prod, on expose 80 (et plus tard 443)
    volumes:
      - ../build/web:/usr/share/nginx/html:ro
    networks:
      - fitlab-net
    restart: unless-stopped  # utile en prod

networks:
  fitlab-net:
    driver: bridge
