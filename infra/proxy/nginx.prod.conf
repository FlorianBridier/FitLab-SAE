worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Cache la version nginx
    server_tokens off;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Limitation de débit sur l'API : 5 requêtes / seconde par IP, burst 20
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

    # CORS : on autorise seulement notre front
    # En dev : http://localhost:8080
    # En prod tu mettras ton domaine (ex: https://fitlab.mon-domaine.fr)
    map $http_origin $cors_allowed_origin {
        default "";
        "http://localhost:8080" $http_origin;
        "https://fitlab.mon-domaine.fr" $http_origin;
    }

    upstream backend_api {
        server backend:3000;
    }

    server {
        listen 80;
        server_name _;

        # === HEADERS DE SÉCURITÉ GLOBAUX ===
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ⚠ CSP SPÉCIALE FLUTTER WEB
        # - autorise self + gstatic + fonts.gstatic + Supabase
        # - autorise inline/eval car Flutter en a besoin (compromis pratique)
        add_header Content-Security-Policy "
          default-src 'self';
          script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com;
          script-src-elem 'self' https://www.gstatic.com;
          connect-src 'self'
                      https://iznmorxlsylczvrnfmum.supabase.co
                      https://www.gstatic.com
                      https://fonts.gstatic.com
                      https://*.supabase.co
                      wss://iznmorxlsylczvrnfmum.supabase.co
                      wss://*.supabase.co;
          img-src 'self' data: https:;
          style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
          font-src 'self' data: https://fonts.gstatic.com;
          worker-src 'self' blob:;
          object-src 'none';
          frame-ancestors 'none';
        " always;

        # === FRONT FLUTTER WEB ===
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri /index.html;
        }

        # === API PROXY VERS BACKEND ===
        location /api/ {
            # CORS
            if ($cors_allowed_origin != "") {
                add_header Access-Control-Allow-Origin $cors_allowed_origin always;
                add_header Vary "Origin" always;
            }

            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Headers
                "Authorization,Content-Type,X-Requested-With" always;
            add_header Access-Control-Allow-Methods
                "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;

            # Préflight CORS
            if ($request_method = OPTIONS) {
                return 204;
            }

            # Limitation de débit sur l’API
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://backend_api;
            proxy_http_version 1.1;

            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
        }

        error_page 404 /index.html;
    }
}
